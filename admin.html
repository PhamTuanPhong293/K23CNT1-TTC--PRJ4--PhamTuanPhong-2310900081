<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị hệ thống - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Thêm font Playfair Display cho tiêu đề để đồng bộ với trang khách -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f6fa;
            /* Màu nền xám trắng siêu nhạt */
            color: #333;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        .brand-text {
            font-family: 'Playfair Display', serif;
        }

        .text-gold {
            color: #d4af37;
        }

        /* Layout Sidebar Đẳng cấp */
        .sidebar {
            min-height: 100vh;
            background-color: #11141a;
            /* Đen nhám sang trọng */
            color: #8b92a5;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .sidebar .brand-text {
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .sidebar a {
            color: #8b92a5;
            text-decoration: none;
            padding: 14px 24px;
            display: block;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            font-weight: 400;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        /* Hiệu ứng Hover & Active trên menu trái */
        .sidebar a:hover,
        .sidebar a.active {
            background-color: rgba(212, 175, 55, 0.08);
            /* Nền vàng cực nhạt */
            color: #d4af37;
            border-left: 3px solid #d4af37;
        }

        .sidebar hr {
            border-color: rgba(255, 255, 255, 0.08);
            margin: 20px 0;
        }

        /* Thiết kế Card (Bảng dữ liệu) bo góc, đổ bóng mềm */
        .custom-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        /* Style cho Bảng (Table) */
        .table {
            margin-bottom: 0;
        }

        .table th {
            border-bottom: 2px solid #f0f0f0;
            color: #9ea4b1;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            padding: 18px 15px;
            background-color: #fafbfc;
        }

        .table td {
            vertical-align: middle;
            border-bottom: 1px solid #f8f9fa;
            color: #444;
            padding: 15px;
        }

        .table-hover tbody tr {
            transition: all 0.2s ease;
        }

        .table-hover tbody tr:hover {
            background-color: #fdfcf9;
            /* Hover dòng chuyển màu kem nhạt */
            transform: scale(1.001);
        }

        /* Nút bấm Vàng kim cao cấp */
        .btn-gold {
            background-color: #d4af37;
            color: white;
            transition: all 0.3s ease;
            border: none;
            font-weight: 500;
        }

        .btn-gold:hover {
            background-color: #b5952f;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>

<body>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar (Menu trái) -->
            <div class="col-md-2 sidebar py-4">
                <h4 class="text-center brand-text fw-bold mb-4 text-white">G9 <span class="text-gold">Admin</span></h4>
                <nav class="mt-5">
                    <a href="#" class="active"><i class="fas fa-box w-25 text-center"></i> Sản phẩm</a>
                    <a href="#"><i class="fas fa-shopping-bag w-25 text-center"></i> Đơn hàng</a>
                    <a href="#"><i class="fas fa-users w-25 text-center"></i> Khách hàng</a>
                    <a href="#"><i class="fas fa-chart-pie w-25 text-center"></i> Thống kê</a>
                    <hr>
                    <a href="index.html" class="text-muted"><i class="fas fa-sign-out-alt w-25 text-center"></i> Đăng
                        xuất</a>
                </nav>
            </div>

            <!-- Main Content (Nội dung chính) -->
            <div class="col-md-10 p-5">
                <!-- Top Header -->
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h2 class="fw-bold m-0 text-dark">Quản lý Sản phẩm</h2>
                        <p class="text-muted mt-1 mb-0 fs-6">Kiểm soát kho hàng và cập nhật mẫu mã mới.</p>
                    </div>
                    <div class="d-flex align-items-center bg-white py-2 px-3 rounded-pill shadow-sm border">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=d4af37&color=fff&bold=true"
                            class="rounded-circle me-2" width="36" alt="Avatar">
                        <span class="fw-medium text-dark" style="font-size: 0.9rem;">Tuấn Phong (Admin)</span>
                        <i class="fas fa-chevron-down ms-3 text-muted" style="font-size: 0.8rem;"></i>
                    </div>
                </div>

                <!-- Bảng dữ liệu sản phẩm (Card bọc ngoài) -->
                <div class="custom-card">
                    <div class="px-4 py-3 d-flex justify-content-between align-items-center border-bottom">
                        <h5 class="m-0 fw-bold text-dark font-sans" style="font-family: 'Poppins', sans-serif;">Danh
                            sách Trang sức</h5>
                        <button class="btn btn-gold btn-sm rounded-pill px-4 py-2">
                            <i class="fas fa-plus me-1"></i> Thêm sản phẩm mới
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle m-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Mã SP</th>
                                    <th>Sản phẩm</th>
                                    <th>Danh mục</th>
                                    <th>Giá bán</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="admin-product-list">
                                <!-- JS sẽ đổ data vào đây -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
