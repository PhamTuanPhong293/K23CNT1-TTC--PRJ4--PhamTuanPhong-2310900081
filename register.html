<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Hình nền đồng bộ với trang Đăng nhập */
            background: linear-gradient(rgba(17, 20, 26, 0.8), rgba(17, 20, 26, 0.8)), url('https://images.unsplash.com/photo-1600003014755-ba31aa59c4b6?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border-top: 4px solid #d4af37;
        }

        h2.brand-title {
            font-family: 'Playfair Display', serif;
            color: #11141a;
            letter-spacing: 1px;
        }

        .text-gold {
            color: #d4af37;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
        }

        .btn-gold {
            background-color: #d4af37;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background-color: #b5952f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .link-gold {
            color: #d4af37;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .link-gold:hover {
            color: #b5952f;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <div class="text-center mb-4">
            <h2 class="brand-title fw-bold mb-1">G9 <span class="text-gold">Trang Sức</span></h2>
            <p class="text-muted small">Tạo tài khoản khách hàng mới</p>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label small fw-medium text-secondary">Họ và tên *</label>
                    <input type="text" class="form-control" id="reg-fullname" placeholder="VD: Phạm Tuấn Phong"
                        required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small fw-medium text-secondary">Số điện thoại *</label>
                    <input type="tel" class="form-control" id="reg-phone" placeholder="VD: 0912345678" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-medium text-secondary">Email</label>
                <input type="email" class="form-control" id="reg-email" placeholder="VD: email@gmail.com">
            </div>

            <div class="mb-3">
                <label class="form-label small fw-medium text-secondary">Tên đăng nhập *</label>
                <input type="text" class="form-control" id="reg-username" placeholder="Nhập tên tài khoản..." required>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-sm-6">
                    <label class="form-label small fw-medium text-secondary">Mật khẩu *</label>
                    <input type="password" class="form-control" id="reg-password" placeholder="••••••••" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small fw-medium text-secondary">Xác nhận mật khẩu *</label>
                    <input type="password" class="form-control" id="reg-confirm" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-gold w-100 mb-4">ĐĂNG KÝ TÀI KHOẢN</button>

            <!-- Nút quay lại trang Đăng nhập -->
            <div class="text-center small text-muted">
                Đã có tài khoản? <a href="login.html" class="link-gold">Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <script>
        // Nếu đã đăng nhập rồi thì chuyển hướng
        const currentUser = JSON.parse(localStorage.getItem('g9_currentUser'));
        if (currentUser) {
            window.location.href = 'index.html';
        }

        const handleRegister = (event) => {
            event.preventDefault();

            const fullname = document.getElementById('reg-fullname').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const username = document.getElementById('reg-username').value.trim().toLowerCase();
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm').value;

            // Kiểm tra khớp mật khẩu
            if (password !== confirmPassword) {
                alert("Lỗi: Mật khẩu xác nhận không khớp!");
                return;
            }

            // Kiểm tra độ dài mật khẩu
            if (password.length < 6) {
                alert("Mật khẩu phải có ít nhất 6 ký tự!");
                return;
            }

            // Lấy danh sách users hiện có
            let users = JSON.parse(localStorage.getItem('g9_users') || '[]');

            // Kiểm tra trùng username
            if (users.some(u => u.username.toLowerCase() === username)) {
                alert("Tên đăng nhập đã tồn tại! Vui lòng chọn tên khác.");
                return;
            }

            // Kiểm tra trùng email
            if (email && users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                alert("Email đã được sử dụng! Vui lòng dùng email khác.");
                return;
            }

            // Thêm user mới
            users.push({
                username: username,
                fullname: fullname,
                email: email || '',
                phone: phone,
                password: password,
                role: 'Khách hàng'
            });
            localStorage.setItem('g9_users', JSON.stringify(users));

            alert("🎉 Đăng ký thành công! Vui lòng đăng nhập để tiếp tục.");
            window.location.href = 'login.html';
        };
    </script>
</body>

</html>
