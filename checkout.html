<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fafafa;
        }

        h1,
        h2,
        h3,
        .navbar-brand,
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .text-gold {
            color: #d4af37;
        }

        .bg-gold {
            background-color: #d4af37;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .bg-gold:hover {
            background-color: #b5952f;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase fs-3" href="index.html">G9 <span class="text-gold">Trang
                    Sức</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="index.html#main-content">Sản phẩm</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="cart.html" class="text-dark me-4 position-relative">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span id="cart-badge"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.65rem;">0</span>
                    </a>
                    <!-- Nút đăng nhập/đăng xuất -->
                    <span id="auth-area">
                        <a href="login.html" class="btn btn-outline-dark rounded-pill px-4">Đăng nhập</a>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Nội dung Thanh toán -->
    <main class="container my-5 flex-grow-1">
        <h2 class="mb-4 fw-bold font-serif text-center">Xác nhận đặt hàng</h2>

        <div class="row g-5 mt-2">
            <!-- Cột trái: Form thông tin -->
            <div class="col-md-7 col-lg-8">
                <div class="bg-white p-4 p-md-5 rounded shadow-sm border-top border-gold border-3">
                    <h4 class="mb-4 fw-bold">Thông tin giao hàng</h4>

                    <!-- Form đặt hàng: Bắt sự kiện onsubmit bằng JS -->
                    <form id="checkout-form" onsubmit="placeOrder(event)">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="form-label fw-medium">Họ và tên người nhận *</label>
                                <input type="text" class="form-control" placeholder="VD: Phạm Tuấn Phong" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-medium">Số điện thoại *</label>
                                <input type="tel" class="form-control" placeholder="VD: 0912345678" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Địa chỉ giao hàng chi tiết *</label>
                                <input type="text" class="form-control"
                                    placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/TP" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Ghi chú thêm (Tùy chọn)</label>
                                <textarea class="form-control" rows="2"
                                    placeholder="VD: Giao trong giờ hành chính..."></textarea>
                            </div>
                        </div>

                        <hr class="my-4">

                        <h4 class="mb-3 fw-bold">Phương thức thanh toán</h4>
                        <div class="form-check mb-2">
                            <input id="cod" name="paymentMethod" type="radio" class="form-check-input" checked required>
                            <label class="form-check-label" for="cod">
                                Thanh toán khi nhận hàng (COD)
                            </label>
                        </div>
                        <div class="form-check">
                            <input id="vnpay" name="paymentMethod" type="radio" class="form-check-input" required>
                            <label class="form-check-label" for="vnpay">
                                Thanh toán trực tuyến (VNPay / PayPal)
                            </label>
                        </div>

                        <button class="w-100 btn bg-gold btn-lg mt-5 rounded-pill shadow-sm" type="submit">Xác nhận đặt
                            hàng</button>
                    </form>
                </div>
            </div>

            <!-- Cột phải: Tóm tắt đơn hàng -->
            <div class="col-md-5 col-lg-4">
                <div class="bg-light p-4 rounded shadow-sm">
                    <h4 class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-muted fw-bold">Đơn hàng của bạn</span>
                        <span class="badge bg-secondary rounded-pill" id="checkout-item-count">0</span>
                    </h4>

                    <ul class="list-group mb-3" id="checkout-summary">
                        <!-- JS sẽ đổ danh sách tóm tắt vào đây -->
                    </ul>

                    <div
                        class="d-flex justify-content-between text-dark fw-bold fs-5 mt-4 pt-3 border-top border-secondary">
                        <span>Tổng tiền thanh toán</span>
                        <span class="text-gold" id="checkout-total">0 ₫</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-4 pb-3 mt-auto">
        <div class="container text-center">
            <p class="mb-0 text-secondary" style="font-size: 0.85rem;">&copy; 2026 G9_TrangSucDB.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
