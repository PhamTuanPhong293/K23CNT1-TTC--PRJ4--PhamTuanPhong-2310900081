<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G9 Trang Sức - Bộ sưu tập cao cấp</title>

    <!-- Bootstrap 5 & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Playfair Display (Cho tiêu đề) & Poppins (Cho văn bản) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fafafa;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        .navbar-brand {
            font-family: 'Playfair Display', serif;
        }

        /* Tông màu vàng kim */
        .text-gold {
            color: #d4af37;
        }

        .bg-gold {
            background-color: #d4af37;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .bg-gold:hover {
            background-color: #b5952f;
            color: white;
            transform: translateY(-2px);
        }

        /* Hiệu ứng di chuột cho thẻ sản phẩm */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 12px;
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1) !important;
        }

        /* Hiệu ứng zoom ảnh mượt mà */
        .img-wrapper {
            overflow: hidden;
            border-radius: 12px 12px 0 0;
        }

        .product-img {
            transition: transform 0.6s ease;
        }

        .card-hover:hover .product-img {
            transform: scale(1.08);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase fs-3" href="#">G9 <span class="text-gold">Trang Sức</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
                    <li class="nav-item"><a class="nav-link active px-3" href="#">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">Nhẫn</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">Dây chuyền</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">Bông tai</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="#" class="text-dark me-4 position-relative">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.65rem;">0</span>
                    </a>
                    <a href="#" class="btn btn-outline-dark rounded-pill px-4">
                        Đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Banner Section -->
    <header class="position-relative text-center text-white mb-5">
        <!-- Ảnh banner trang sức -->
        <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1920&q=80"
            alt="Banner" class="w-100" style="height: 500px; object-fit: cover; filter: brightness(0.55);">

        <!-- Nội dung đè lên ảnh -->
        <div class="position-absolute top-50 start-50 translate-middle w-100 px-3">
            <h1 class="display-3 fw-bold mb-3 text-gold">Tôn vinh vẻ đẹp kiêu sa</h1>
            <p class="lead mb-4 fw-light" style="letter-spacing: 2px;">Khám phá bộ sưu tập cao cấp mùa tinh hoa 2026</p>
            <a href="#product-list" class="btn bg-gold btn-lg px-5 rounded-pill">Khám phá ngay</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container my-5 flex-grow-1" id="main-content">
        <div class="text-center mb-5">
            <h2 class="text-uppercase fw-bold">Bộ sưu tập nổi bật</h2>
            <div class="mx-auto mt-2" style="width: 60px; height: 3px; background-color: #d4af37;"></div>
        </div>

        <div class="row g-4" id="product-list">
            <!-- Render bằng JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-5 pb-3 mt-auto border-top border-gold">
        <div class="container text-center">
            <h4 class="mb-3 text-gold" style="font-family: 'Playfair Display', serif;">G9 Trang Sức</h4>
            <p class="text-muted fw-light">Mang đến sự hoàn mỹ trong từng đường nét.</p>
            <p class="mb-0 text-secondary mt-4" style="font-size: 0.85rem;">&copy; 2026 G9_TrangSucDB. Thiết kế bởi Phạm
                Tuấn Phong.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
