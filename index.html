<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G9 Trang Sức - Bộ sưu tập cao cấp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fafafa;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        .navbar-brand {
            font-family: 'Playfair Display', serif;
        }

        .text-gold {
            color: #d4af37;
        }

        .bg-gold {
            background-color: #d4af37;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .bg-gold:hover {
            background-color: #b5952f;
            color: white;
            transform: translateY(-2px);
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 12px;
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1) !important;
        }

        .img-wrapper {
            overflow: hidden;
            border-radius: 12px 12px 0 0;
        }

        .product-img {
            transition: transform 0.6s ease;
        }

        .card-hover:hover .product-img {
            transform: scale(1.08);
        }

        .product-title-hover {
            transition: color 0.3s ease;
        }

        .product-title-hover:hover {
            color: #d4af37 !important;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase fs-3" href="index.html">G9 <span class="text-gold">Trang
                    Sức</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
                    <li class="nav-item"><a class="nav-link active px-3" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#" onclick="filterCategory('Nhẫn')">Nhẫn</a>
                    </li>
                    <li class="nav-item"><a class="nav-link px-3" href="#" onclick="filterCategory('Dây chuyền')">Dây
                            chuyền</a></li>

                    <li class="nav-item"><a class="nav-link px-3" href="#" onclick="filterCategory('Bông tai')">Bông
                            tai</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="cart.html" class="text-dark me-4 position-relative">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span id="cart-badge"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.65rem;">0</span>
                    </a>
                    <span id="auth-area">
                        <a href="login.html" class="btn btn-outline-dark rounded-pill px-4">Đăng nhập</a>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <header class="position-relative text-center text-white mb-5">
        <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1920&q=80"
            alt="Banner" class="w-100" style="height: 500px; object-fit: cover; filter: brightness(0.55);">
        <div class="position-absolute top-50 start-50 translate-middle w-100 px-3">
            <h1 class="display-3 fw-bold mb-3 text-gold">Tôn vinh vẻ đẹp kiêu sa</h1>
            <p class="lead mb-4 fw-light" style="letter-spacing: 2px;">Khám phá bộ sưu tập cao cấp mùa tinh hoa 2026</p>
            <a href="#main-content" class="btn bg-gold btn-lg px-5 rounded-pill">Khám phá ngay</a>
        </div>
    </header>

    <main class="container my-5 flex-grow-1" id="main-content">
        <div class="text-center mb-5">
            <h2 class="text-uppercase fw-bold">Bộ sưu tập nổi bật</h2>
            <div class="mx-auto mt-2" style="width: 60px; height: 3px; background-color: #d4af37;"></div>
        </div>

        <div class="row mb-5 align-items-center bg-white p-3 rounded-4 shadow-sm border border-light">
            <div class="col-md-7 mb-3 mb-md-0">
                <div class="d-flex gap-2 flex-wrap">
                    <span class="fw-bold me-2 d-flex align-items-center"><i
                            class="fas fa-filter text-gold me-2"></i>Lọc:</span>
                    <button class="btn btn-dark rounded-pill px-4 filter-btn" onclick="filterCategory('All')">Tất
                        cả</button>
                    <button class="btn btn-outline-dark rounded-pill px-4 filter-btn"
                        onclick="filterCategory('Nhẫn')">Nhẫn</button>
                    <button class="btn btn-outline-dark rounded-pill px-4 filter-btn"
                        onclick="filterCategory('Dây chuyền')">Dây chuyền</button>
                    <button class="btn btn-outline-dark rounded-pill px-4 filter-btn"
                        onclick="filterCategory('Bông tai')">Bông tai</button>
                </div>
            </div>
            <div class="col-md-5">
                <div class="input-group shadow-sm rounded-pill overflow-hidden">
                    <span class="input-group-text bg-white border-0 text-muted ps-4"><i
                            class="fas fa-search"></i></span>
                    <input type="text" id="searchInput" class="form-control border-0 bg-white py-2 shadow-none"
                        placeholder="Nhập tên trang sức..." onkeyup="searchProducts()">
                </div>
            </div>
        </div>

        <div class="row g-4" id="product-list">
        </div>
    </main>

    <footer class="bg-dark text-white pt-5 pb-3 mt-auto border-top border-gold">
        <div class="container text-center">
            <h4 class="mb-3 text-gold" style="font-family: 'Playfair Display', serif;">G9 Trang Sức</h4>
            <p class="text-muted fw-light">Mang đến sự hoàn mỹ trong từng đường nét.</p>
            <p class="mb-0 text-secondary mt-4" style="font-size: 0.85rem;">&copy; 2026 G9_TrangSucDB. Thiết kế bởi Phạm
                Tuấn Phong.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
