<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Hình nền mờ ảo sang trọng */
            background: linear-gradient(rgba(17, 20, 26, 0.8), rgba(17, 20, 26, 0.8)), url('https://images.unsplash.com/photo-1600003014755-ba31aa59c4b6?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border-top: 4px solid #d4af37;
        }

        h2.brand-title {
            font-family: 'Playfair Display', serif;
            color: #11141a;
            letter-spacing: 1px;
        }

        .text-gold {
            color: #d4af37;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
        }

        .btn-gold {
            background-color: #d4af37;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background-color: #b5952f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .link-gold {
            color: #d4af37;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .link-gold:hover {
            color: #b5952f;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="brand-title fw-bold mb-1">G9 <span class="text-gold">Trang Sức</span></h2>
            <p class="text-muted small">Đăng nhập để trải nghiệm mua sắm</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label small fw-medium text-secondary">Tên đăng nhập / Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i
                            class="fas fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" placeholder="Nhập tài khoản..."
                        required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label small fw-medium text-secondary">Mật khẩu</label>
                    <a href="#" class="small link-gold">Quên mật khẩu?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i
                            class="fas fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••"
                        required>
                </div>
            </div>

            <button type="submit" class="btn btn-gold w-100 mb-4">ĐĂNG NHẬP</button>

            <div class="text-center small text-muted">
                Chưa có tài khoản? <a href="register.html" class="link-gold">Đăng ký ngay</a>
            </div>

            <!-- Gợi ý test cho lúc chấm đồ án -->
            <div class="mt-4 p-2 bg-light rounded text-center" style="font-size: 0.75rem; border: 1px dashed #ccc;">
                <span class="fw-bold text-dark">Gợi ý test (Mock):</span><br>
                - Nhập <b>admin</b> để vào trang Quản trị.<br>
                - Nhập bất kỳ tài khoản khác để vào Trang chủ.
            </div>
        </form>
    </div>

    <!-- Script xử lý chuyển trang -->
    <script>
        const handleLogin = (event) => {
            event.preventDefault(); // Chặn load trang
            const user = document.getElementById('username').value.toLowerCase();

            // Giả lập phân quyền đăng nhập
            if (user === 'admin' || user === 'bdhuy') {
                alert("Đăng nhập thành công với quyền Quản trị viên!");
                window.location.href = 'admin.html'; // Chuyển vào Admin
            } else {
                alert("Đăng nhập thành công! Chào mừng khách hàng.");
                window.location.href = 'index.html'; // Chuyển về Trang chủ
            }
        };
    </script>
</body>

</html>
