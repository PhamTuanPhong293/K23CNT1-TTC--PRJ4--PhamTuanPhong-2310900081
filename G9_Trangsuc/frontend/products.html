<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - G9 Trang Sức</title>
    <meta name="description" content="Khám phá bộ sưu tập trang sức cao cấp G9 - Nhẫn, Dây chuyền, Bông tai, Vòng tay">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div id="navbar"></div>

<section class="product-page-header">
    <div class="container">
        <h1><i class="fas fa-gem me-3"></i>Danh sách sản phẩm</h1>
        <p>Khám phá các mẫu trang sức sang trọng và tinh tế tại G9</p>
    </div>
</section>

<div class="container py-4 flex-grow-1">
    <!-- Filter & Search -->
    <div class="row mb-4 align-items-center bg-white p-3 rounded-4 shadow-sm border border-light">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="product-toolbar">
                <div class="search-box">
                    <input type="text" id="keyword" class="form-control" placeholder="Tìm trang sức...">
                    <button onclick="searchProduct()" class="btn btn-dark">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="dropdown">
                <button class="btn btn-outline-dark dropdown-toggle rounded-pill w-100" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-filter me-2"></i>Lọc theo danh mục
                </button>
                <ul class="dropdown-menu w-100" id="category-dropdown"></ul>
            </div>
        </div>
    </div>

    <div class="row g-4" id="product-list">
        <div class="col-12 text-center py-5">
            <div class="loading-spinner"></div>
            <p class="text-muted mt-2">Đang tải sản phẩm...</p>
        </div>
    </div>

    <div class="mt-4 text-center" id="pagination"></div>
</div>

<div id="footer"></div>

<button onclick="openChatbot()" class="btn btn-warning rounded-circle shadow chatbot-btn">💬</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/product.js"></script>
<script src="assets/js/category-menu.js"></script>
<script src="assets/js/chatbot.js"></script>

</body>
</html>
