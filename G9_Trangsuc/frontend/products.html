<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a href="index.html" class="navbar-brand text-warning fw-bold">G9 Trang Sức</a>

            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm">Trang chủ</a>
                <a href="cart.html" class="btn btn-warning btn-sm">Giỏ hàng</a>
                <a href="login.html" class="btn btn-light btn-sm">Đăng nhập</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">

        <h2 class="mb-4">Danh sách sản phẩm</h2>

        <div class="input-group mb-4">
            <input type="text" id="keyword" class="form-control" placeholder="Nhập tên sản phẩm cần tìm...">
            
            <button onclick="searchProduct()" class="btn btn-dark">
                Tìm kiếm
            </button>
            /*--*/
            <div class="row mb-4">

                <div class="col-md-4">

                    <select id="category-filter" class="form-control" onchange="filterByCategory()">

                    </select>

                </div>

            </div>
        </div>

        <div class="row" id="product-list"></div>
        <div class="mt-4 text-center" id="pagination">
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/product.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/category-menu.js"></script>

</body>

</html>
