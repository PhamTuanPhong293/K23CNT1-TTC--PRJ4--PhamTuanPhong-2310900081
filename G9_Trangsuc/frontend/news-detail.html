<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết tin tức - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div id="navbar"></div>

<main class="container my-5 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-muted">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="news.html" class="text-decoration-none text-muted">Tin tức</a></li>
            <li class="breadcrumb-item active text-dark fw-medium" aria-current="page" id="bread-title">Chi tiết</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm">
                <span class="badge bg-gold rounded-pill px-3 mb-3" id="news-category">Tin tức</span>
                <h1 class="fw-bold mb-3" id="news-title">Đang tải...</h1>
                <div class="d-flex align-items-center text-muted mb-4">
                    <i class="far fa-calendar me-2"></i>
                    <span id="news-date"></span>
                </div>
                <img id="news-image" class="w-100 rounded-3 mb-4" style="max-height: 400px; object-fit: cover;" src="" alt=""
                     onerror="this.style.display='none'">
                <div id="news-content" class="lh-lg text-muted">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/news-detail.js"></script>

</body>
</html>
