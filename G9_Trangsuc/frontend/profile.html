<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div id="navbar"></div>

<main class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="profile-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <img id="profile-avatar" src="" class="rounded-circle shadow mb-3" width="80" height="80" alt="Avatar">
                    <h3 class="fw-bold" id="profile-name">Người dùng</h3>
                    <span class="badge bg-gold rounded-pill px-3 py-2" id="profile-role">Khách hàng</span>
                </div>

                <hr class="my-4">

                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label small fw-medium text-muted">Tên đăng nhập</label>
                        <input type="text" class="form-control rounded-3" id="profile-username" readonly>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label small fw-medium text-muted">Email</label>
                        <input type="email" class="form-control rounded-3" id="profile-email" readonly>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label small fw-medium text-muted">Số điện thoại</label>
                        <input type="text" class="form-control rounded-3" id="profile-phone" readonly>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-3">
                    <a href="orders.html" class="btn btn-outline-dark rounded-pill px-4">
                        <i class="fas fa-box me-2"></i>Đơn hàng của tôi
                    </a>
                    <a href="wishlist.html" class="btn btn-outline-danger rounded-pill px-4">
                        <i class="fas fa-heart me-2"></i>Yêu thích
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/profile.js"></script>

</body>
</html>
