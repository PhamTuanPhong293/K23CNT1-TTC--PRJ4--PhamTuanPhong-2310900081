<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div id="navbar"></div>

<main class="container my-5 flex-grow-1">
    <h2 class="mb-4 fw-bold"><i class="fas fa-shopping-cart text-gold me-2"></i>Giỏ hàng của bạn</h2>

    <div class="bg-white p-4 rounded-4 shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Đơn giá</th>
                        <th class="text-center">Số lượng</th>
                        <th>Thành tiền</th>
                        <th>Xóa</th>
                    </tr>
                </thead>
                <tbody id="cart-body">
                    <!-- Cart items rendered by JS -->
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
            <a href="products.html" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-1"></i> Tiếp tục mua sắm
            </a>
            <div class="text-end">
                <h4 class="fw-bold mb-3">Tổng cộng: <span id="cart-total" class="text-gold">0 ₫</span></h4>
                <a href="checkout.html" class="btn bg-gold btn-lg rounded-pill px-5 text-decoration-none shadow-sm">
                    <i class="fas fa-credit-card me-2"></i>Tiến hành thanh toán
                </a>
            </div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/cart.js"></script>

</body>
</html>
