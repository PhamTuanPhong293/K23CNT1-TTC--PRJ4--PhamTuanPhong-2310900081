<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="brand-text fw-bold mb-1" style="font-family: 'Playfair Display', serif; color: #11141a;">
                G9 <span class="text-gold">Trang Sức</span>
            </h2>
            <p class="text-muted small">Đăng nhập để trải nghiệm mua sắm</p>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-medium text-secondary">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control border-start-0" id="username" placeholder="Nhập tài khoản..." required>
            </div>
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="form-label small fw-medium text-secondary">Mật khẩu</label>
                <a href="forgot-password.html" class="small link-gold">Quên mật khẩu?</a>
            </div>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <button onclick="login()" class="btn btn-gold w-100 mb-4 py-2 fw-bold rounded-pill shadow-sm">
            <i class="fas fa-sign-in-alt me-2"></i>ĐĂNG NHẬP
        </button>

        <div class="text-center small text-muted">
            Chưa có tài khoản? <a href="register.html" class="link-gold">Đăng ký ngay</a>
        </div>

        <div class="text-center mt-3">
            <a href="index.html" class="text-muted small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Quay về trang chủ
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/login.js"></script>

</body>
</html>
