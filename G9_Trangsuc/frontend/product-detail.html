<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a href="index.html" class="navbar-brand text-warning fw-bold">G9 Trang Sức</a>
            <a href="cart.html" class="btn btn-warning btn-sm">Giỏ hàng</a>
        </div>
    </nav>

    <div class="container py-5">

        <div class="row">

            <div class="col-md-6">
                <img id="product-image" class="img-fluid rounded shadow">
            </div>

            <div class="col-md-6">

                <h2 id="product-name"></h2>

                <h4 id="product-price" class="text-danger my-3"></h4>

                <p id="product-material"></p>

                <p id="product-description"></p>

                <button id="btn-cart" class="btn btn-warning">
                    Thêm vào giỏ hàng
                </button>

                <hr>

                <h4>Đánh giá sản phẩm</h4>

                <div id="review-list" class="mb-4"></div>

                <div class="card">
                    <div class="card-body">

                        <h5>Viết đánh giá</h5>

                        <select id="review-stars" class="form-control mb-3">
                            <option value="5">5 sao</option>
                            <option value="4">4 sao</option>
                            <option value="3">3 sao</option>
                            <option value="2">2 sao</option>
                            <option value="1">1 sao</option>
                        </select>

                        <textarea id="review-content" class="form-control mb-3"
                            placeholder="Nhập nội dung đánh giá"></textarea>

                        <button onclick="createReview()" class="btn btn-dark">
                            Gửi đánh giá
                        </button>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/product-detail.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/footer.js"></script>

</body>

</html>
