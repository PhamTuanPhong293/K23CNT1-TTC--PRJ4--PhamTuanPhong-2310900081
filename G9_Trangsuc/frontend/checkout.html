<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<div id="navbar"></div>

<main class="container my-5 flex-grow-1">
    <h2 class="mb-4 fw-bold text-center font-serif">
        <i class="fas fa-credit-card text-gold me-2"></i>Xác nhận đặt hàng
    </h2>

    <div class="row g-5 mt-2">
        <!-- Cột trái: Form thông tin -->
        <div class="col-md-7 col-lg-8">
            <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm border-top border-3" style="border-color: #d4af37 !important;">
                <h4 class="mb-4 fw-bold"><i class="fas fa-truck text-gold me-2"></i>Thông tin giao hàng</h4>

                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label fw-medium">Tên người nhận *</label>
                        <input type="text" id="receiver" class="form-control rounded-3" placeholder="VD: Phạm Tuấn Phong" required>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-medium">Số điện thoại *</label>
                        <input type="tel" id="phone" class="form-control rounded-3" placeholder="VD: 0912345678" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-medium">Địa chỉ giao hàng *</label>
                        <input type="text" id="address" class="form-control rounded-3"
                               placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/TP" required>
                    </div>
                </div>

                <hr class="my-4">

                <h4 class="mb-3 fw-bold"><i class="fas fa-wallet text-gold me-2"></i>Phương thức thanh toán</h4>
                <div class="form-check mb-2">
                    <input id="cod" name="paymentMethod" type="radio" class="form-check-input" value="COD" checked>
                    <label class="form-check-label" for="cod">
                        <i class="fas fa-money-bill-wave text-gold me-1"></i> Thanh toán khi nhận hàng (COD)
                    </label>
                </div>
                <div class="form-check">
                    <input id="online" name="paymentMethod" type="radio" class="form-check-input" value="Online">
                    <label class="form-check-label" for="online">
                        <i class="fas fa-globe text-gold me-1"></i> Thanh toán trực tuyến (VNPay / PayPal)
                    </label>
                </div>

                <button onclick="checkout()" class="w-100 btn bg-gold btn-lg mt-5 rounded-pill shadow-sm fw-bold">
                    <i class="fas fa-check-circle me-2"></i>Xác nhận đặt hàng
                </button>
            </div>
        </div>

        <!-- Cột phải: Tóm tắt đơn hàng -->
        <div class="col-md-5 col-lg-4">
            <div class="bg-light p-4 rounded-4 shadow-sm">
                <h4 class="d-flex justify-content-between align-items-center mb-4">
                    <span class="text-muted fw-bold">Đơn hàng</span>
                    <span class="badge bg-secondary rounded-pill" id="checkout-item-count">0</span>
                </h4>

                <div id="checkout-summary">
                    <!-- Rendered by JS -->
                </div>

                <div class="d-flex justify-content-between text-dark fw-bold fs-5 mt-4 pt-3 border-top border-secondary">
                    <span>Tổng tiền</span>
                    <span class="text-gold" id="checkout-total">0 ₫</span>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/checkout.js"></script>

</body>
</html>
