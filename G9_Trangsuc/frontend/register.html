<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="col-md-5 mx-auto">

        <div class="card shadow border-0 rounded-4">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">
                    Đăng ký tài khoản
                </h2>

                <input id="fullname" class="form-control mb-3" placeholder="Họ tên">

                <input id="username" class="form-control mb-3" placeholder="Tên đăng nhập">

                <input id="email" class="form-control mb-3" placeholder="Email">

                <input id="phone" class="form-control mb-3" placeholder="Số điện thoại">

                <input id="password" type="password" class="form-control mb-3" placeholder="Mật khẩu">

                <button onclick="register()" class="btn btn-dark w-100">
                    Đăng ký
                </button>

                <div class="text-center mt-3">
                    <a href="login.html">Đã có tài khoản? Đăng nhập</a>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/register.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>

</body>
</html>
