<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="login-page" style="padding: 40px 0;">

<div class="login-wrapper">
    <div class="login-card" style="max-width: 500px;">
        <div class="text-center mb-4">
            <h2 class="brand-text fw-bold mb-1" style="font-family: 'Playfair Display', serif; color: #11141a;">
                G9 <span class="text-gold">Trang Sức</span>
            </h2>
            <p class="text-muted small">Tạo tài khoản khách hàng mới</p>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-sm-6">
                <label class="form-label small fw-medium text-secondary">Họ và tên *</label>
                <input type="text" class="form-control rounded-3" id="fullname" placeholder="VD: Phạm Tuấn Phong" required>
            </div>
            <div class="col-sm-6">
                <label class="form-label small fw-medium text-secondary">Số điện thoại *</label>
                <input type="tel" class="form-control rounded-3" id="phone" placeholder="VD: 0912345678" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-medium text-secondary">Email</label>
            <input type="email" class="form-control rounded-3" id="email" placeholder="VD: email@gmail.com">
        </div>

        <div class="mb-3">
            <label class="form-label small fw-medium text-secondary">Tên đăng nhập *</label>
            <input type="text" class="form-control rounded-3" id="username" placeholder="Nhập tên tài khoản..." required>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-medium text-secondary">Mật khẩu *</label>
            <input type="password" class="form-control rounded-3" id="password" placeholder="••••••••" required>
        </div>

        <button onclick="register()" class="btn btn-gold w-100 mb-4 py-2 fw-bold rounded-pill shadow-sm">
            <i class="fas fa-user-plus me-2"></i>ĐĂNG KÝ TÀI KHOẢN
        </button>

        <div class="text-center small text-muted">
            Đã có tài khoản? <a href="login.html" class="link-gold">Đăng nhập ngay</a>
        </div>

        <div class="text-center mt-3">
            <a href="index.html" class="text-muted small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Quay về trang chủ
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/register.js"></script>

</body>
</html>
