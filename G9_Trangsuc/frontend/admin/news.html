<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tin tức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<div class="admin-content">

    <h3 class="mb-4">Quản lý tin tức</h3>

    <div class="card admin-card mb-4">
        <div class="card-body">

            <h5>Thêm / Cập nhật tin tức</h5>

            <input type="hidden" id="newsId">

            <input id="title" class="form-control mb-3" placeholder="Tiêu đề tin tức">

            <input id="shortDescription" class="form-control mb-3" placeholder="Mô tả ngắn">

            <textarea id="content" class="form-control mb-3" rows="5" placeholder="Nội dung tin tức"></textarea>

            <input id="image" class="form-control mb-3" placeholder="Tên ảnh, ví dụ: vang1.jpg">

            <select id="categoryId" class="form-control mb-3"></select>

            <select id="status" class="form-control mb-3">
                <option value="Hiển thị">Hiển thị</option>
                <option value="Ẩn">Ẩn</option>
            </select>

            <button onclick="saveNews()" class="btn btn-success">
                Lưu tin tức
            </button>

            <button onclick="resetNewsForm()" class="btn btn-secondary">
                Làm mới
            </button>

        </div>
    </div>

    <div class="card admin-card">
        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th>Mã</th>
                        <th>Ảnh</th>
                        <th>Tiêu đề</th>
                        <th>Danh mục</th>
                        <th>Người đăng</th>
                        <th>Trạng thái</th>
                        <th>Ngày đăng</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="news-body"></tbody>
            </table>

        </div>
    </div>

</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-layout.js"></script>

<script>
    renderAdminLayout("news");
</script>

<script src="../assets/js/admin-news.js"></script>

</body>
</html>
