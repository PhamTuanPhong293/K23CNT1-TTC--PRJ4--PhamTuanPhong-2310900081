<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý giá vàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<div class="admin-content">

    <h3 class="mb-4">Quản lý giá vàng</h3>

    <div class="card admin-card mb-4">
        <div class="card-body">

            <h5>Thêm / Cập nhật giá vàng</h5>

            <input type="hidden" id="goldId">

            <input id="type" class="form-control mb-3" placeholder="Loại vàng: SJC, Vàng 24K, Vàng 18K">

            <input id="buyPrice" type="number" class="form-control mb-3" placeholder="Giá mua">

            <input id="sellPrice" type="number" class="form-control mb-3" placeholder="Giá bán">

            <button onclick="saveGold()" class="btn btn-success">
                Lưu giá vàng
            </button>

            <button onclick="resetGoldForm()" class="btn btn-secondary">
                Làm mới
            </button>

        </div>
    </div>

    <div class="card admin-card">
        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th>Mã</th>
                        <th>Loại vàng</th>
                        <th>Giá mua</th>
                        <th>Giá bán</th>
                        <th>Ngày cập nhật</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="gold-body"></tbody>
            </table>

        </div>
    </div>

</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-layout.js"></script>

<script>
    renderAdminLayout("gold");
</script>

<script src="../assets/js/admin-gold.js"></script>

</body>
</html>
