<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<div class="admin-content">

    <h3 class="mb-4">Quản lý danh mục</h3>

    <div class="card admin-card mb-4">
        <div class="card-body">

            <h5>Thêm / Cập nhật danh mục</h5>

            <input type="hidden" id="categoryId">

            <input id="name" class="form-control mb-3" placeholder="Tên danh mục">
            <input id="description" class="form-control mb-3" placeholder="Mô tả">
            <input id="parentId" type="number" class="form-control mb-3" placeholder="Mã danh mục cha, bỏ trống nếu là danh mục cha">

            <select id="status" class="form-control mb-3">
                <option value="Hoạt động">Hoạt động</option>
                <option value="Ẩn">Ẩn</option>
            </select>

            <button onclick="saveCategory()" class="btn btn-success">
                Lưu danh mục
            </button>

            <button onclick="resetForm()" class="btn btn-secondary">
                Làm mới
            </button>

        </div>
    </div>

    <div class="card admin-card">
        <div class="card-body">

            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>Mã</th>
                        <th>Tên danh mục</th>
                        <th>Mô tả</th>
                        <th>Danh mục cha</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="category-body"></tbody>
            </table>

        </div>
    </div>

</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-layout.js"></script>
<script>
    renderAdminLayout("categories");
</script>
<script src="../assets/js/admin-categories.js"></script>

</body>
</html>
