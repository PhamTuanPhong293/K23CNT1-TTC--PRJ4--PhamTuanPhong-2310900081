<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">
    <div class="col-md-7 mx-auto">

        <h3 class="mb-4">Sửa sản phẩm</h3>

        <input id="name" class="form-control mb-3" placeholder="Tên sản phẩm">
        <input id="categoryId" type="number" class="form-control mb-3" placeholder="Mã danh mục">
        <input id="material" class="form-control mb-3" placeholder="Chất liệu">
        <input id="price" type="number" class="form-control mb-3" placeholder="Giá">
        <input id="quantity" type="number" class="form-control mb-3" placeholder="Số lượng">
        <input id="image" class="form-control mb-3" placeholder="Tên ảnh">
        <textarea id="description" class="form-control mb-3" placeholder="Mô tả"></textarea>

        <select id="status" class="form-control mb-3">
            <option value="Còn hàng">Còn hàng</option>
            <option value="Hết hàng">Hết hàng</option>
            <option value="Ngừng bán">Ngừng bán</option>
        </select>

        <button onclick="updateProduct()" class="btn btn-warning">
            Cập nhật
        </button>

        <a href="products.html" class="btn btn-secondary">
            Quay lại
        </a>

    </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-product-edit.js"></script>

</body>
</html>
