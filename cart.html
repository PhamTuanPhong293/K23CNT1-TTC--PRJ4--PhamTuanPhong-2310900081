<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fafafa;
        }

        h1,
        h2,
        h3,
        .navbar-brand {
            font-family: 'Playfair Display', serif;
        }

        .text-gold {
            color: #d4af37;
        }

        .bg-gold {
            background-color: #d4af37;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .bg-gold:hover {
            background-color: #b5952f;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase fs-3" href="index.html">G9 <span class="text-gold">Trang
                    Sức</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">Nhẫn</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">Dây chuyền</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="cart.html" class="text-dark me-4 position-relative">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span id="cart-badge"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.65rem;">0</span>
                    </a>
                    <a href="login.html" class="btn btn-outline-dark rounded-pill px-4">Đăng nhập</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Nội dung Giỏ hàng -->
    <main class="container my-5 flex-grow-1">
        <h2 class="mb-4 fw-bold">Giỏ hàng của bạn</h2>

        <div class="bg-white p-4 rounded shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th class="text-center">Số lượng</th>
                            <th>Thành tiền</th>
                            <th>Xóa</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Danh sách sản phẩm trong giỏ sẽ được đổ vào đây bằng JS -->
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                <a href="index.html" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Tiếp tục mua sắm
                </a>
                <div class="text-end">
                    <h4 class="fw-bold mb-3">Tổng cộng: <span id="cart-total" class="text-gold">0 ₫</span></h4>
                    <a href="checkout.html" class="btn bg-gold btn-lg rounded-pill px-5 text-decoration-none">Tiến hành
                        thanh toán</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-5 pb-3 mt-auto border-top border-gold">
        <div class="container text-center">
            <h4 class="mb-3 text-gold" style="font-family: 'Playfair Display', serif;">G9 Trang Sức</h4>
            <p class="mb-0 text-secondary mt-4" style="font-size: 0.85rem;">&copy; 2026 G9_TrangSucDB.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
