<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khuyến mãi - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body data-page="admin">
    <nav class="navbar navbar-expand-lg g9-navbar sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <span class="brand-mark">G9</span>
                <div class="nav-compact">
                    <span>Admin</span>
                    <small>Trang Sức</small>
                </div>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html"><i class="fas fa-users me-2"></i>Người dùng</a></li>
                    <li class="nav-item">
                        <button onclick="logout()" class="btn btn-outline-danger btn-sm ms-2"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 bg-light min-vh-100 p-4 border-end border-1" style="border-color: rgba(199,154,43,0.18);">
                <h6 class="fw-800 mb-3 text-uppercase" style="color: var(--g9-primary-dark);">
                    <i class="fas fa-cog me-2"></i>Quản trị
                </h6>
                <nav class="admin-nav">
                    <a href="dashboard.html" class="admin-nav-link mb-2"><i class="fas fa-home me-2"></i>Dashboard</a>
                    <a href="products.html" class="admin-nav-link mb-2"><i class="fas fa-box me-2"></i>Sản phẩm</a>
                    <a href="categories.html" class="admin-nav-link mb-2"><i class="fas fa-list me-2"></i>Danh mục</a>
                    <a href="orders.html" class="admin-nav-link mb-2"><i class="fas fa-shopping-cart me-2"></i>Đơn hàng</a>
                    <a href="users.html" class="admin-nav-link mb-2"><i class="fas fa-users me-2"></i>Người dùng</a>
                    <a href="news.html" class="admin-nav-link mb-2"><i class="fas fa-newspaper me-2"></i>Tin tức</a>
                    <a href="gold-price.html" class="admin-nav-link mb-2"><i class="fas fa-coins me-2"></i>Giá vàng</a>
                    <a href="promotions.html" class="admin-nav-link mb-2 active"><i class="fas fa-tags me-2"></i>Khuyến mãi</a>
                </nav>
            </div>

            <div class="col-lg-10 p-4">
                <div class="mb-4">
                    <h2 class="section-title mb-0">Quản lý khuyến mãi</h2>
                    <p class="section-subtitle">Tạo, cập nhật và xem danh sách mã khuyến mãi</p>
                </div>

                <div class="card admin-card mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-800 mb-4">
                            <i class="fas fa-percent me-2" style="color: var(--g9-primary);"></i>Thêm / Cập nhật khuyến mãi
                        </h5>
                        <form id="promotionForm">
                            <input type="hidden" id="promotionId">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-700">Mã khuyến mãi</label>
                                    <input id="code" class="form-control" placeholder="VD: G9SUMMER" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-700">Giảm giá (VNĐ)</label>
                                    <input id="discountValue" type="number" class="form-control" placeholder="Giá trị giảm" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-700">Trạng thái</label>
                                    <select id="status" class="form-select">
                                        <option value="Active">Active</option>
                                        <option value="Inactive">Inactive</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Ngày bắt đầu</label>
                                    <input id="startDate" type="date" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Ngày kết thúc</label>
                                    <input id="endDate" type="date" class="form-control">
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="button" onclick="savePromotion()" class="btn btn-warning">
                                    <i class="fas fa-save me-2"></i>Lưu khuyến mãi
                                </button>
                                <button type="button" onclick="resetPromotionForm()" class="btn btn-outline-secondary">
                                    <i class="fas fa-redo me-2"></i>Làm mới
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card admin-card">
                    <div class="card-body">
                        <h5 class="card-title fw-800 mb-4">
                            <i class="fas fa-list me-2" style="color: var(--g9-primary);"></i>Danh sách khuyến mãi
                        </h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th class="fw-800">ID</th>
                                        <th class="fw-800">Mã</th>
                                        <th class="fw-800">Giảm giá</th>
                                        <th class="fw-800">Trạng thái</th>
                                        <th class="fw-800">Bắt đầu</th>
                                        <th class="fw-800">Kết thúc</th>
                                        <th class="fw-800 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="promotionTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .admin-nav-link {
            display: inline-block;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            color: var(--g9-secondary);
            font-weight: 700;
            transition: all .2s ease;
            width: 100%;
            border-left: 3px solid transparent;
        }
        .admin-nav-link:hover, .admin-nav-link.active {
            background: linear-gradient(135deg, rgba(199,154,43,0.08), rgba(199,154,43,0.04));
            color: var(--g9-primary-dark);
            border-left-color: var(--g9-primary);
        }
        .admin-card {
            background: rgba(255,255,255,0.92);
        }
        .form-label { font-weight: 700; color: var(--g9-secondary); }
        .fw-700 { font-weight: 700; }
        .fw-800 { font-weight: 800; }
    </style>

    <script src="../assets/js/shared/config.js"></script>
    <script src="../assets/js/shared/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/admin/promotions.js"></script>
</body>
</html>
