<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm khuyến mãi - G9 Trang Sức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>

<body data-page="admin">
    <nav class="navbar navbar-expand-lg g9-navbar sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <span class="brand-mark">G9</span>
                <div class="nav-compact">
                    <span>Admin</span>
                    <small>Trang Sức</small>
                </div>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html"><i class="fas fa-users me-2"></i>Người dùng</a></li>
                    <li class="nav-item">
                        <button onclick="logout()" class="btn btn-outline-danger btn-sm ms-2"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid admin-page-wrap">
        <div class="admin-layout">
                        <aside id="adminSidebar" class="admin-sidebar-panel bg-light border-end border-1">
                <button type="button" id="adminSidebarToggle" class="admin-sidebar-toggle-btn" aria-expanded="true" aria-controls="adminSidebarNav" title="Thu gọn menu">
                    <span class="admin-sidebar-toggle-label">
                        <i class="fas fa-cog me-2"></i><span class="admin-sidebar-title-text">Quản trị</span>
                    </span>
                    <i class="fas fa-angles-left admin-sidebar-toggle-icon" aria-hidden="true"></i>
                </button>
                <nav id="adminSidebarNav" class="admin-nav admin-sidebar-menu">
                    <a href="dashboard.html" class="admin-nav-link mb-2" title="Dashboard"><i class="fas fa-home me-2"></i><span>Dashboard</span></a>
                    <a href="products.html" class="admin-nav-link mb-2" title="Sản phẩm"><i class="fas fa-box me-2"></i><span>Sản phẩm</span></a>
                    <a href="categories.html" class="admin-nav-link mb-2" title="Danh mục"><i class="fas fa-list me-2"></i><span>Danh mục</span></a>
                    <a href="orders.html" class="admin-nav-link mb-2" title="Đơn hàng"><i class="fas fa-shopping-cart me-2"></i><span>Đơn hàng</span></a>
                    <a href="users.html" class="admin-nav-link mb-2" title="Người dùng"><i class="fas fa-users me-2"></i><span>Người dùng</span></a>
                    <a href="news.html" class="admin-nav-link mb-2" title="Tin tức"><i class="fas fa-newspaper me-2"></i><span>Tin tức</span></a>
                    <a href="gold-price.html" class="admin-nav-link mb-2" title="Giá vàng"><i class="fas fa-coins me-2"></i><span>Giá vàng</span></a>
                    <a href="promotions.html" class="admin-nav-link mb-2" title="Khuyến mãi"><i class="fas fa-tags me-2"></i><span>Khuyến mãi</span></a>
                </nav>
            </aside>

            <div id="adminMain" class="admin-content-panel">
                <div class="mb-4">
                    <h2 class="section-title mb-0">Thêm khuyến mãi</h2>
                    <p class="section-subtitle">Tạo mã khuyến mãi mới cho cửa hàng</p>
                </div>

                <div class="card admin-card shadow-sm">
                    <div class="card-body">
                        <form id="promotionForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Mã khuyến mãi</label>
                                    <input id="code" class="form-control" placeholder="VD: G9SUMMER" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Giảm giá (VNĐ)</label>
                                    <input id="discountValue" type="number" class="form-control" placeholder="Giá trị giảm" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Ngày bắt đầu</label>
                                    <input id="startDate" type="date" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Ngày kết thúc</label>
                                    <input id="endDate" type="date" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-700">Trạng thái</label>
                                    <select id="status" class="form-select">
                                        <option value="Active">Active</option>
                                        <option value="Inactive">Inactive</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="button" onclick="createPromotion()" class="btn btn-warning">
                                    <i class="fas fa-save me-2"></i>Thêm khuyến mãi
                                </button>
                                <a href="promotions.html" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left me-2"></i>Quay lại
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/shared/config.js"></script>
    <script src="../assets/js/shared/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/admin/admin-sidebar.js"></script>
    <script src="../assets/js/admin/admin-promotion-create.js"></script>
</body>
</html>
