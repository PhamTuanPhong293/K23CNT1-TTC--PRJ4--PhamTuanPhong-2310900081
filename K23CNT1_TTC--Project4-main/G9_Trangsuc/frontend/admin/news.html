<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Quản lý tin tức - G9 Trang Sức</title>
</head>

<body data-page="admin">

    <!-- Admin Navbar -->
    <nav class="navbar navbar-expand-lg g9-navbar sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <span class="brand-mark">G9</span>
                <div class="nav-compact">
                    <span>Admin</span>
                    <small>Tin tức</small>
                </div>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html"><i class="fas fa-users me-2"></i>Người dùng</a></li>
                    <li class="nav-item">
                        <button onclick="logout()" class="btn btn-outline-danger btn-sm ms-2"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-2 bg-light min-vh-100 p-4 border-end border-1" style="border-color: rgba(199,154,43,0.18);">
                <h6 class="fw-800 mb-3 text-uppercase" style="color: var(--g9-primary-dark);">
                    <i class="fas fa-cog me-2"></i>Quản trị
                </h6>
                <nav class="admin-nav">
                    <a href="dashboard.html" class="admin-nav-link mb-2"><i class="fas fa-home me-2"></i>Dashboard</a>
                    <a href="products.html" class="admin-nav-link mb-2"><i class="fas fa-box me-2"></i>Sản phẩm</a>
                    <a href="categories.html" class="admin-nav-link mb-2"><i class="fas fa-list me-2"></i>Danh mục</a>
                    <a href="orders.html" class="admin-nav-link mb-2"><i class="fas fa-shopping-cart me-2"></i>Đơn hàng</a>
                    <a href="users.html" class="admin-nav-link mb-2"><i class="fas fa-users me-2"></i>Người dùng</a>
                    <a href="news.html" class="admin-nav-link mb-2 active"><i class="fas fa-newspaper me-2"></i>Tin tức</a>
                    <a href="gold-price.html" class="admin-nav-link mb-2"><i class="fas fa-coins me-2"></i>Giá vàng</a>
                    <a href="promotions.html" class="admin-nav-link mb-2"><i class="fas fa-tags me-2"></i>Khuyến mãi</a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col-lg-10 p-4">
                <div class="mb-4">
                    <h2 class="section-title mb-0">Quản lý tin tức</h2>
                    <p class="section-subtitle">Thêm và quản lý các bài viết tin tức</p>
                </div>

                <div class="card admin-card mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-800 mb-4">
                            <i class="fas fa-edit me-2" style="color: var(--g9-primary);"></i>Thêm / Cập nhật tin tức
                        </h5>
                        <input type="hidden" id="newsId">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-700">Tiêu đề</label>
                                <input id="title" class="form-control" placeholder="Tiêu đề tin tức">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-700">Danh mục</label>
                                <select id="categoryId" class="form-select"></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-700">Mô tả ngắn</label>
                                <input id="shortDescription" class="form-control" placeholder="Mô tả ngắn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-700">Ảnh</label>
                                <input id="image" class="form-control" placeholder="Tên ảnh, ví dụ: vang1.jpg">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-700">Nội dung</label>
                                <textarea id="content" class="form-control" rows="5" placeholder="Nội dung tin tức"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-700">Trạng thái</label>
                                <select id="status" class="form-select">
                                    <option value="Hiển thị">Hiển thị</option>
                                    <option value="Ẩn">Ẩn</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button onclick="saveNews()" class="btn btn-warning">
                                <i class="fas fa-save me-2"></i>Lưu tin tức
                            </button>
                            <button onclick="resetNewsForm()" class="btn btn-outline-secondary">
                                <i class="fas fa-redo me-2"></i>Làm mới
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card admin-card">
                    <div class="card-body">
                        <h5 class="card-title fw-800 mb-4">
                            <i class="fas fa-list me-2" style="color: var(--g9-primary);"></i>Danh sách tin tức
                        </h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th class="fw-800">Mã</th>
                                        <th class="fw-800">Ảnh</th>
                                        <th class="fw-800">Tiêu đề</th>
                                        <th class="fw-800">Danh mục</th>
                                        <th class="fw-800">Người đăng</th>
                                        <th class="fw-800">Trạng thái</th>
                                        <th class="fw-800">Ngày đăng</th>
                                        <th class="fw-800 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="news-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .admin-nav-link {
            display: inline-block;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            color: var(--g9-secondary);
            font-weight: 700;
            transition: all .2s ease;
            width: 100%;
            border-left: 3px solid transparent;
        }
        .admin-nav-link:hover, .admin-nav-link.active {
            background: linear-gradient(135deg, rgba(199,154,43,0.08), rgba(199,154,43,0.04));
            color: var(--g9-primary-dark);
            border-left-color: var(--g9-primary);
        }
        .admin-card {
            background: rgba(255,255,255,0.92);
        }
        .fw-700 { font-weight: 700; }
        .fw-800 { font-weight: 800; }
    </style>

    <script src="../assets/js/shared/config.js"></script>
    <script src="../assets/js/shared/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/admin/admin-news.js"></script>

</body>
</html>
