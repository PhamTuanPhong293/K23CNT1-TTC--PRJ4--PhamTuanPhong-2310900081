<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ==============================
     NAVBAR ADMIN
================================= -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">Admin G9 Trang Sức</a>
        <a href="../user/index.html" class="btn btn-warning btn-sm">Về trang chủ</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- ==============================
             SIDEBAR ADMIN
        ================================= -->
        <div class="col-md-2 bg-light min-vh-100 p-3">
            <h5>Quản trị</h5>

            <a href="dashboard.html" class="btn btn-dark w-100 mb-2">Dashboard</a>
            <a href="products.html" class="btn btn-outline-dark w-100 mb-2">Sản phẩm</a>
            <a href="categories.html" class="btn btn-outline-dark w-100 mb-2">Danh mục</a>
            <a href="orders.html" class="btn btn-outline-dark w-100 mb-2">Đơn hàng</a>
            <a href="users.html" class="btn btn-outline-dark w-100 mb-2">Người dùng</a>
            <a href="news.html" class="btn btn-outline-dark w-100 mb-2">Tin tức</a>
            <a href="gold-price.html" class="btn btn-outline-dark w-100 mb-2">Giá vàng</a>
        </div>

        <!-- ==============================
             NỘI DUNG DASHBOARD
        ================================= -->
        <div class="col-md-10 p-4">
            <h2 class="mb-4">Thống kê tổng quan</h2>

            <div class="row">

                <div class="col-md-3">
                    <div class="card bg-primary text-white shadow-sm">
                        <div class="card-body">
                            <h5>Sản phẩm</h5>
                            <h2 id="totalProducts">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-success text-white shadow-sm">
                        <div class="card-body">
                            <h5>Đơn hàng</h5>
                            <h2 id="totalOrders">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-warning text-dark shadow-sm">
                        <div class="card-body">
                            <h5>Người dùng</h5>
                            <h2 id="totalUsers">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-danger text-white shadow-sm">
                        <div class="card-body">
                            <h5>Doanh thu</h5>
                            <h4 id="revenue">0 VNĐ</h4>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="../assets/js/shared/config.js"></script>
<script src="../assets/js/admin/dashboard.js"></script>

</body>
</html>
