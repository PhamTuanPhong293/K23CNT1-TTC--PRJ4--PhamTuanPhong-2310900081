<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">Admin G9 Trang Sức</a>
        <button onclick="logout()" class="btn btn-danger btn-sm">Đăng xuất</button>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 bg-light min-vh-100 p-3">
            <h5>Quản trị</h5>
            <a href="dashboard.html" class="btn btn-outline-dark w-100 mb-2">Dashboard</a>
            <a href="products.html" class="btn btn-outline-dark w-100 mb-2">Sản phẩm</a>
            <a href="categories.html" class="btn btn-dark w-100 mb-2">Danh mục</a>
            <a href="orders.html" class="btn btn-outline-dark w-100 mb-2">Đơn hàng</a>
            <a href="users.html" class="btn btn-outline-dark w-100 mb-2">Người dùng</a>
            <a href="news.html" class="btn btn-outline-dark w-100 mb-2">Tin tức</a>
            <a href="gold-price.html" class="btn btn-outline-dark w-100 mb-2">Giá vàng</a>
        </div>

        <div class="col-md-10 p-4">
            <h2>Quản lý danh mục</h2>

            <div class="card p-3 mb-4">
                <h5 id="formTitle">Thêm danh mục</h5>

                <form id="categoryForm">
                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label>Tên danh mục</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Danh mục cha</label>
                            <select id="parentId" class="form-select"></select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Trạng thái</label>
                            <select id="status" class="form-select">
                                <option value="Hoạt động">Hoạt động</option>
                                <option value="Ẩn">Ẩn</option>
                            </select>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label>Mô tả</label>
                            <textarea id="description" class="form-control"></textarea>
                        </div>

                    </div>

                    <button id="submitBtn" class="btn btn-warning">Thêm danh mục</button>
                    <button type="button" onclick="resetCategoryForm()" class="btn btn-secondary">Làm mới</button>
                </form>
            </div>

            <table class="table table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tên</th>
                        <th>Mô tả</th>
                        <th>Danh mục cha</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="categoryTable">
                    <tr>
                        <td colspan="6">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="../assets/js/shared/config.js"></script>
<script src="../assets/js/admin/categories.js"></script>

</body>
</html>
