<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bộ Sưu Tập Trang Sức - G9</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/user.css">
</head>

<body data-page="products">

    <!-- Navigation -->
    <div id="site-navbar"></div>

    <!-- Hero Section -->
    <section class="products-hero">
        <div class="container w-100">
            <div class="products-hero-content">
                <h1 class="fade-up">Bộ Sưu Tập Trang Sức</h1>
                <p class="fade-up">Khám phá những thiết kế tinh tế, sang trọng và đẳng cấp</p>
            </div>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="container">
        <div class="filter-section fade-up">
            <div class="row">
                <div class="col-lg-5">
                    <div class="filter-title">🔍 Tìm kiếm</div>
                    <input type="text" class="form-control custom-search-input" id="searchInput"
                        placeholder="Nhập tên sản phẩm, chất liệu..." />
                </div>

                <div class="col-lg-3">
                    <div class="filter-title">💰 Khoảng giá</div>
                    <select id="priceFilter" class="form-select custom-select-input">
                        <option value="all">Tất cả giá</option>
                        <option value="1">Dưới 1 triệu</option>
                        <option value="2">1 - 5 triệu</option>
                        <option value="3">Trên 5 triệu</option>
                    </select>
                </div>

                <div class="col-lg-3">
                    <div class="filter-title">⭐ Sắp xếp</div>
                    <select id="sortFilter" class="form-select custom-select-input">
                        <option value="default">Mới nhất</option>
                        <option value="asc">Giá thấp → Cao</option>
                        <option value="desc">Giá cao → Thấp</option>
                        <option value="name-asc">Tên A-Z</option>
                    </select>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-4">
                    <div class="filter-title">⭐ Đánh giá</div>
                    <select id="ratingFilter" class="form-select custom-select-input">
                        <option value="all">Tất cả sao</option>
                        <option value="5">5 sao trở lên</option>
                        <option value="4">4 sao trở lên</option>
                        <option value="3">3 sao trở lên</option>
                        <option value="2">2 sao trở lên</option>
                        <option value="1">1 sao trở lên</option>
                    </select>
                </div>
            </div>

            <!-- Category Filters -->
            <div class="category-filters">
                <button class="category-filter-btn active category-btn" data-category="all">Tất cả</button>
                <button class="category-filter-btn category-btn" data-category="Nhẫn">💍 Nhẫn</button>
                <button class="category-filter-btn category-btn" data-category="Dây chuyền">✨ Dây chuyền</button>
                <button class="category-filter-btn category-btn" data-category="Bông tai">💎 Bông tai</button>
                <button class="category-filter-btn category-btn" data-category="Lắc tay">🌟 Lắc tay</button>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="container pb-5">
        <div class="row g-4" id="productList"></div>
    </section>

    <!-- Footer -->
    <div id="site-footer"></div>

    <script src="../assets/js/shared/config.js"></script>
    <script src="../assets/js/shared/components.js"></script>
    <script src="../assets/js/user/product.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
