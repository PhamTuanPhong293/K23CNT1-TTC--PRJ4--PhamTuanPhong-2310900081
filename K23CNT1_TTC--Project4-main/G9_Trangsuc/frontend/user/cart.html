<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Giỏ hàng - G9 Trang Sức</title>

<body data-page="cart">
<div id="site-navbar"></div>
<section class="page-section pt-5">
    <div class="container">
        <div class="surface-card p-4 p-lg-5 mb-4">
            <h1 class="section-title mb-2">Giỏ hàng của bạn</h1>
            <p class="section-subtitle mb-0">Tổng tiền được cập nhật realtime khi bạn thay đổi số lượng hoặc xóa sản phẩm.</p>
        </div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="cartBody">
                    <tr><td colspan="6" class="text-center py-5">Đang tải giỏ hàng...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="cartEmptyState" class="d-none"></div>
        <div class="text-end" id="totalBox"></div>
        <div class="text-end mt-4">
            <a href="checkout.html" class="btn btn-warning px-5">Tiến hành thanh toán</a>
        </div>
    </div>
</section>
<div id="site-footer"></div>
