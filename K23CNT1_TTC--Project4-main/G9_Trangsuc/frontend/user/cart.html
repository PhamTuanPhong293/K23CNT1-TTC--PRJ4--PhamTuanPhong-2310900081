<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">G9 Trang Sức</a>

        <div>
            <a href="products.html" class="btn btn-outline-light btn-sm">Sản phẩm</a>
            <a href="checkout.html" class="btn btn-warning btn-sm">Thanh toán</a>
        </div>
    </div>
</nav>

<main class="container my-5">

    <h2 class="mb-4">Giỏ hàng của bạn</h2>

    <table class="table table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>Ảnh</th>
                <th>Sản phẩm</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody id="cartBody">
            <tr>
                <td colspan="6">Đang tải giỏ hàng...</td>
            </tr>
        </tbody>
    </table>

    <h4 id="totalBox" class="text-end text-danger"></h4>

    <div class="text-end">
        <a href="checkout.html" class="btn btn-warning">
            Tiến hành thanh toán
        </a>
    </div>

</main>

<footer class="bg-dark text-white text-center py-3">
    G9 Trang Sức © 2026
</footer>

<script src="../assets/js/shared/config.js"></script>
<script src="../assets/js/user/cart.js"></script>

</body>
</html>
