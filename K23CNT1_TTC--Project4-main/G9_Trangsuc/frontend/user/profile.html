<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Tài khoản của tôi - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body data-page="profile">
<div id="site-navbar"></div>
<section class="page-section pt-5">
    <div class="container">
        <div class="surface-card p-4 p-lg-5">
            <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
                <div>
                    <h1 class="section-title mb-1">Thông tin tài khoản</h1>
                    <p class="section-subtitle mb-0">Quản lý hồ sơ cá nhân và theo dõi đơn hàng của bạn.</p>
                </div>
                <button onclick="logout()" class="btn btn-outline-danger">Đăng xuất</button>
            </div>
            <div class="row g-4">
                <div class="col-md-6"><div class="feature-card"><h3>Họ tên</h3><p id="profile-name"></p></div></div>
                <div class="col-md-6"><div class="feature-card"><h3>Tên đăng nhập</h3><p id="profile-username"></p></div></div>
                <div class="col-md-6"><div class="feature-card"><h3>Email</h3><p id="profile-email"></p></div></div>
                <div class="col-md-6"><div class="feature-card"><h3>Vai trò</h3><p id="profile-role"></p></div></div>
            </div>
            <div class="mt-4"><a href="orders.html" class="btn btn-warning px-5">Xem đơn hàng của tôi</a></div>
            <hr class="my-5">
            <div class="profile-edit-form">
                <h2 class="section-title mb-3">Chỉnh sửa thông tin tài khoản</h2>
                <form id="profile-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="input-fullname" class="form-label">Họ tên</label>
                            <input id="input-fullname" type="text" class="form-control" placeholder="Nhập họ tên" required>
                        </div>
                        <div class="col-md-6">
                            <label for="input-username" class="form-label">Tên đăng nhập</label>
                            <input id="input-username" type="text" class="form-control" placeholder="Tên đăng nhập" required>
                        </div>
                        <div class="col-md-6">
                            <label for="input-email" class="form-label">Email</label>
                            <input id="input-email" type="email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="col-md-6">
                            <label for="input-phone" class="form-label">Số điện thoại</label>
                            <input id="input-phone" type="tel" class="form-control" placeholder="Số điện thoại" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-warning px-4">Lưu thay đổi</button>
                        </div>
                    </div>
                </form>
            </div>
            <hr class="my-5">
            <div class="profile-password-form">
                <h2 class="section-title mb-3">Đổi mật khẩu</h2>
                <form id="password-form">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="input-current-password" class="form-label">Mật khẩu hiện tại</label>
                            <input id="input-current-password" type="password" class="form-control" placeholder="Mật khẩu hiện tại" required>
                        </div>
                        <div class="col-md-4">
                            <label for="input-new-password" class="form-label">Mật khẩu mới</label>
                            <input id="input-new-password" type="password" class="form-control" placeholder="Mật khẩu mới" required>
                        </div>
                        <div class="col-md-4">
                            <label for="input-confirm-password" class="form-label">Xác nhận mật khẩu</label>
                            <input id="input-confirm-password" type="password" class="form-control" placeholder="Xác nhận mật khẩu" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-outline-warning px-4">Đổi mật khẩu</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
<div id="site-footer"></div>
<script src="../assets/js/shared/config.js?v=3"></script>
<script src="../assets/js/shared/components.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/user/profile.js"></script>
</body>
</html>
