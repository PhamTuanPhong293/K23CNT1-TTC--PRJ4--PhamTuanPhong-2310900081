<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Đăng ký - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body data-page="register">
    <div class="login-page-wrapper">
        <section class="register-page" style="min-height: 80vh; padding: 3rem 1rem;">
            <div class="auth-card mx-auto">
                <div class="auth-brand"><span class="brand-mark">G9</span>
                    <div>
                        <div class="footer-brand h4 mb-0">G9 Trang Sức</div>
                        <div class="footer-note">Tạo tài khoản mới</div>
                    </div>
                </div>
                <h1 class="auth-title">Đăng ký tài khoản</h1>
                <p class="auth-desc">Tạo tài khoản để lưu giỏ hàng, đặt hàng và theo dõi đơn mua một cách dễ dàng.</p>
                <div class="mb-3"><input id="fullname" class="form-control" placeholder="Họ tên"></div>
                <div class="mb-3"><input id="username" class="form-control" placeholder="Tên đăng nhập"></div>
                <div class="mb-3"><input id="email" class="form-control" placeholder="Email"></div>
                <div class="mb-3"><input id="phone" class="form-control" placeholder="Số điện thoại"></div>
                <div class="mb-4"><input id="password" type="password" class="form-control" placeholder="Mật khẩu">
                </div>
                <button onclick="register()" class="btn btn-warning w-100 py-3">Đăng ký</button>
                <div class="text-center mt-3"><a href="login.html">Đã có tài khoản? Đăng nhập</a></div>
            </div>
        </section>
    </div>
    <script src="../assets/js/shared/config.js?v=3"></script>
    <script src="../assets/js/shared/components.js?v=3"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/user/register.js"></script>
</body>

</html>
