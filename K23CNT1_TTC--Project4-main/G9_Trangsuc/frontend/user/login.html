<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Đăng nhập - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body data-page="login">
    <div class="login-page-wrapper">
        <section class="login-page" style="min-height: 80vh; padding: 3rem 1rem;">
            <div class="auth-card mx-auto">
                <div class="auth-brand"><span class="brand-mark">G9</span>
                    <div>
                        <div class="footer-brand h4 mb-0">G9 Trang Sức</div>
                    </div>
                </div>
                <h1 class="auth-title">Chào mừng trở lại</h1>
                <p class="auth-desc">Đăng nhập để theo dõi giỏ hàng realtime, xem đơn hàng và nhận trải nghiệm mua sắm
                    mượt hơn.</p>
                <form id="loginForm">
                    <div class="mb-3"><label class="form-label fw-bold">Tên đăng nhập</label><input type="text"
                            id="username" class="form-control" required></div>
                    <div class="mb-4"><label class="form-label fw-bold">Mật khẩu</label><input type="password"
                            id="password" class="form-control" required></div>
                    <button class="btn btn-warning w-100 py-3" type="submit">Đăng nhập</button>
                </form>
                <div class="text-center mt-3"><a href="register.html">Chưa có tài khoản? Đăng ký</a></div>
                <div class="text-center mt-3"><a href="index.html" class="text">← Quay về trang chủ</a></div>
            </div>
        </section>
    </div>
    <script src="../assets/js/shared/config.js?v=3"></script>
    <script src="../assets/js/shared/components.js?v=3"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/user/login.js"></script>
</body>

</html>
