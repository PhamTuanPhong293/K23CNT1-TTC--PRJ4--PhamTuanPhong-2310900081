<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">G9 Trang Sức</a>

        <div>
            <a href="products.html" class="btn btn-outline-light btn-sm">Sản phẩm</a>
            <a href="cart.html" class="btn btn-outline-light btn-sm">Giỏ hàng</a>
        </div>
    </div>
</nav>

<main class="container my-5">

    <h2 class="mb-4">Thông tin thanh toán</h2>

    <form id="checkoutForm" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Tên người nhận</label>
            <input type="text" id="receiverName" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <input type="text" id="phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Địa chỉ giao hàng</label>
            <textarea id="address" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Phương thức thanh toán</label>
            <select id="paymentMethod" class="form-select">
                <option value="COD">Thanh toán khi nhận hàng</option>
                <option value="BANK">Chuyển khoản ngân hàng</option>
            </select>
        </div>

        <button class="btn btn-warning">
            Đặt hàng
        </button>

    </form>

</main>

<footer class="bg-dark text-white text-center py-3">
    G9 Trang Sức © 2026
</footer>

<script src="../assets/js/shared/config.js"></script>
<script src="../assets/js/user/checkout.js"></script>

</body>
</html>
