<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Thanh toán - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body data-page="checkout">
<div id="site-navbar"></div>
<section class="page-section pt-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="surface-card p-4 p-lg-5">
                    <h1 class="section-title mb-2">Thông tin thanh toán</h1>
                    <p class="section-subtitle">Nhập thông tin giao hàng để hoàn tất đơn hàng.</p>
                    <form id="checkoutForm" class="mt-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên người nhận</label>
                            <input type="text" id="receiverName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" id="phone" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa chỉ giao hàng</label>
                            <textarea id="address" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Phương thức thanh toán</label>
                            <select id="paymentMethod" class="form-select">
                                <option value="COD">Thanh toán khi nhận hàng</option>
                                <option value="PAYPAL">PayPal</option>
                            </select>
                        </div>
                        <button class="btn btn-warning px-5" type="submit">Đặt hàng</button>
                        <button class="btn btn-danger px-5 ms-3" type="button" id="cancelBtn">Hủy</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="price-card mb-4">
                    <h5 class="fw-bold mb-3">Đơn hàng của bạn</h5>
                    <div id="checkoutSummary" class="d-grid gap-3">
                        <div class="text-muted">Đang tải sản phẩm...</div>
                    </div>
                </div>
                <!-- Mã giảm giá -->
                <div class="price-card mb-4" id="couponSection">
                    <h5 class="fw-bold mb-3">
                        <i class="fas fa-tag text-gold me-2"></i>Mã giảm giá
                    </h5>
                    <div class="coupon-input-group">
                        <input type="text" id="couponCode" class="form-control coupon-input" placeholder="Nhập mã giảm giá..." autocomplete="off">
                        <button type="button" id="applyCouponBtn" class="btn btn-gold coupon-apply-btn">
                            <i class="fas fa-check me-1"></i>Áp dụng
                        </button>
                    </div>
                    <div id="couponResult" class="coupon-result" style="display: none;"></div>
                    <div id="couponSummary" style="display: none;">
                        <hr class="my-3" style="border-color: rgba(199,154,43,0.18);">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted">Tạm tính</span>
                            <span class="fw-bold" id="originalTotalDisplay">0 VNĐ</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="coupon-discount-label">
                                <i class="fas fa-percent me-1"></i>Giảm giá
                            </span>
                            <span class="fw-bold coupon-discount-value" id="discountAmountDisplay">-0 VNĐ</span>
                        </div>
                        <hr class="my-2" style="border-color: rgba(199,154,43,0.18);">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold fs-6">Tổng thanh toán</span>
                            <span class="fw-bold fs-4 text-gold" id="finalTotalDisplay">0 VNĐ</span>
                        </div>
                    </div>
                </div>
                <div class="price-card">
                    <h5 class="fw-bold mb-3">Lưu ý</h5>
                    <p class="text-muted mb-0">Sau khi đặt hàng thành công, giỏ hàng sẽ được làm mới và đơn hàng của bạn sẽ xuất hiện trong trang tài khoản.</p>
                </div>
            </div>
        </div>
    </div>
</section>
<div id="site-footer"></div>
<script src="../assets/js/shared/config.js?v=3"></script>
<script src="../assets/js/shared/components.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/user/checkout.js"></script>
</body>
</html>
