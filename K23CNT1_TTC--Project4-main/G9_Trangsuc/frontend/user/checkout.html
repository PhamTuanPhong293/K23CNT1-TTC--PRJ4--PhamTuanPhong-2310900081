<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Thanh toán - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body data-page="checkout">
<div id="site-navbar"></div>
<section class="page-section pt-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="surface-card p-4 p-lg-5">
                    <h1 class="section-title mb-2">Thông tin thanh toán</h1>
                    <p class="section-subtitle">Nhập thông tin giao hàng để hoàn tất đơn hàng.</p>
                    <form id="checkoutForm" class="mt-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên người nhận</label>
                            <input type="text" id="receiverName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" id="phone" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa chỉ giao hàng</label>
                            <textarea id="address" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Phương thức thanh toán</label>
                            <select id="paymentMethod" class="form-select">
                                <option value="COD">Thanh toán khi nhận hàng</option>
                                <option value="BANK">Chuyển khoản ngân hàng</option>
                            </select>
                        </div>
                        <button class="btn btn-warning px-5" type="submit">Đặt hàng</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="price-card">
                    <h5 class="fw-bold mb-3">Lưu ý</h5>
                    <p class="text-muted mb-0">Sau khi đặt hàng thành công, giỏ hàng sẽ được làm mới và đơn hàng của bạn sẽ xuất hiện trong trang tài khoản.</p>
                </div>
            </div>
        </div>
    </div>
</section>
<div id="site-footer"></div>
<script src="../assets/js/shared/config.js?v=3"></script>
<script src="../assets/js/shared/components.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/user/checkout.js"></script>
</body>
</html>
