<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Thanh toán thất bại - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body data-page="cart">
<div id="site-navbar"></div>
<div class="login-page-wrapper">
    <section class="login-page" style="min-height: 80vh; padding: 3rem 1rem;">
        <div class="auth-card mx-auto text-center">
            <div class="icon-circle mx-auto mb-3">!</div>
            <h1 class="auth-title mb-2">Thanh toán chưa thành công</h1>
            <p class="auth-desc">Thanh toán chưa hoàn tất. Sản phẩm sẽ được trả lại giỏ hàng để bạn thử lại.</p>
            <a href="cart.html" class="btn btn-warning px-5">Quay lại giỏ hàng</a>
        </div>
    </section>
</div>
<div id="site-footer"></div>
    <script src="../assets/js/shared/config.js?v=3"></script>
<script src="../assets/js/shared/components.js?v=3"></script>
    <script>
        // Khi PayPal redirect về trang thất bại, sẽ có token (paypal order id) trong query
        (function(){
            const params = new URLSearchParams(window.location.search);
            const paypalOrderId = params.get('token');
            if (!paypalOrderId) return;

            async function notifyCancel() {
                try {
                    const backendOrigin = getBackendOrigin();
                    const res = await fetch(`${backendOrigin}/api/paypal/cancel`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paypal_order_id: paypalOrderId })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.success !== false) {
                        dispatchCartChanged();
                    }
                } catch (err) {
                    console.error('Failed to notify backend of PayPal cancel', err);
                }
            }

            notifyCancel();
        })();
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
