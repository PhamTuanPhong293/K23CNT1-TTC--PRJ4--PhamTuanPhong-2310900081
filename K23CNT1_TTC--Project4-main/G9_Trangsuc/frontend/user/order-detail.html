<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Chi tiết đơn hàng - G9 Trang Sức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body data-page="orders">
<div id="site-navbar"></div>
<section class="page-section pt-5">
    <div class="container">
        <div class="surface-card p-4 p-lg-5 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h1 class="section-title mb-0">Chi tiết đơn hàng</h1>
                <a href="orders.html" class="btn btn-outline-secondary btn-sm">Quay lại</a>
            </div>
            <p class="section-subtitle mb-0">Thông tin chi tiết về đơn hàng của bạn.</p>
        </div>
        <div class="row g-4">
            <!-- Left side: Order Info -->
            <div class="col-lg-4">
                <div class="surface-card p-4">
                    <h5 class="fw-bold mb-4">Thông tin đơn hàng</h5>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Mã đơn hàng</label>
                        <span id="order-id" class="fw-bold">-</span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Ngày đặt</label>
                        <span id="order-date">-</span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Trạng thái</label>
                        <span id="order-status" class="badge badge-soft">-</span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Người nhận</label>
                        <span id="order-receiver" class="fw-semibold">-</span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Số điện thoại</label>
                        <span id="order-phone">-</span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Địa chỉ giao hàng</label>
                        <span id="order-address">-</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Tổng tiền</span>
                        <span id="order-total" class="text-gold fw-bold fs-5">-</span>
                    </div>
                </div>
            </div>
            <!-- Right side: Products -->
            <div class="col-lg-8">
                <div class="surface-card p-4">
                    <h5 class="fw-bold mb-4">Danh sách sản phẩm</h5>
                    <div class="table-responsive">
                        <table class="table align-middle text-nowrap">
                            <thead>
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th>Đơn giá</th>
                                    <th>Số lượng</th>
                                    <th>Thành tiền</th>
                                </tr>
                            </thead>
                            <tbody id="orderDetailBody">
                                <tr><td colspan="4" class="text-center py-4 text-muted">Đang tải chi tiết đơn hàng...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<div id="site-footer"></div>
<script src="../assets/js/shared/config.js?v=3"></script>
<script src="../assets/js/shared/components.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/user/order.js"></script>
</body>
</html>
